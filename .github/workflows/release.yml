name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without v prefix"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: false
        type: boolean
      skip_homebrew:
        description: "Skip updating roughcoder/homebrew-infinite-stack"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 1.2.3, optionally prefixed with v." >&2
            exit 2
          fi

      - name: Build and publish GitHub release
        run: |
          set -euo pipefail
          args=("${{ inputs.version }}" "--skip-homebrew")
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            args+=("--draft")
          fi
          scripts/release_github.sh "${args[@]}"

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-macos-${{ inputs.version }}
          path: |
            dist/Jarvis-macos.zip
            dist/Jarvis-macos.zip.sha256
            dist/install_latest.sh
            dist/release-notes.md

  update-homebrew:
    needs: release
    if: ${{ !inputs.draft && !inputs.skip_homebrew }}
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_DIR: ${{ github.workspace }}/homebrew-infinite-stack
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: jarvis-apple

      - name: Check tap token
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "Set HOMEBREW_TAP_TOKEN with write access to roughcoder/homebrew-infinite-stack, or rerun with skip_homebrew=true." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: roughcoder/homebrew-infinite-stack
          path: homebrew-infinite-stack
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Configure git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Homebrew cask
        working-directory: jarvis-apple
        run: scripts/update_homebrew_cask.sh "${{ inputs.version }}" "${{ github.repository }}"

